<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | Al-Mustafa Programming</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body.admin-login-body {
            background-color: #07080a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .premium-login-container {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.02) 0%, rgba(0, 0, 0, 0.6) 100%);
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
        }

        .premium-login-container h1 {
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .premium-login-container p.subtitle {
            color: var(--gray-text);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .premium-login-container h1 span {
            color: var(--primary-gold);
        }

        .admin-form input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s ease;
            box-sizing: border-box;
            text-align: right;
        }

        .admin-form input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
        }

        .admin-form input::placeholder {
            color: #555;
        }

        .error-message-box {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #ff4a4a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>

<body class="admin-page admin-login-body">
    <div class="premium-login-container">
        <h1>لوحة <span>الإدارة</span></h1>
        <p class="subtitle">بوابة التحكم المركزية لـ Al-Mustafa Portal</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error-message-box">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ messages[0] }}</span>
        </div>
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin.login') }}" method="POST" class="admin-form">
            <input type="text" name="username" placeholder="اسم المستخدم" required autocomplete="off">
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="cta-button"
                style="width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 10px;">
                <i class="fas fa-shield-alt"></i> دخول آمن
            </button>
        </form>
    </div>
</body>

</html>
