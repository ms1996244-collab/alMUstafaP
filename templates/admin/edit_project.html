<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>تعديل المشروع | Al-Mustafa Programming</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .preview-wrapper {
            border: 1px solid var(--primary-gold);
            padding: 20px;
            border-radius: 10px;
            background: var(--dark-bg);
            text-align: center;
            margin-top: 20px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .editor-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .editor-box {
            flex: 1;
            min-width: 300px;
        }

        .status-select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 8px;
        }

        .datetime-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--primary-gold);
            color: #fff;
            border-radius: 8px;
        }
    </style>
</head>

<body class="admin-page">
    <div class="admin-container editor-container">

        <div class="admin-card editor-box">
            <h2>تعديل المشروع: {{ project.title }}</h2>
            <form action="{{ url_for('edit_project', id=project.id) }}" method="POST" class="admin-form">
                <label style="color: var(--primary-gold); font-size: 0.9rem;">اسم المشروع</label>
                <input type="text" id="title" name="title" value="{{ project.title }}" required>

                <label style="color: var(--primary-gold); font-size: 0.9rem;">وصف قصير</label>
                <input type="text" id="description" name="description" value="{{ project.description }}" required>

                <label style="color: var(--primary-gold); font-size: 0.9rem;">التفاصيل الكاملة</label>
                <textarea name="full_details" rows="4" required>{{ project.full_details }}</textarea>

                <label style="color: var(--primary-gold); font-size: 0.9rem;">التقنيات</label>
                <input type="text" name="technologies" value="{{ project.technologies }}" required>

                <label style="color: var(--primary-gold); font-size: 0.9rem;">رابط الصورة المباشر أو الأيقونة</label>
                <input type="text" id="icon" name="icon" value="{{ project.icon }}" required
                    style="margin-bottom: 20px;">

                <!-- حقول الجدولة وحالة النشر -->
                <label style="color: var(--primary-gold); font-size: 0.9rem; font-weight: bold;"><i
                        class="fas fa-clock"></i> حالة النشر</label>
                <select name="status" class="status-select" onchange="toggleDate(this)">
                    <option value="published" {% if project.status=='published' %}selected{% endif %}>نشر فوري (مرئي
                        للزوار)</option>
                    <option value="draft" {% if project.status=='draft' %}selected{% endif %}>حفظ كمسودة (مخفي)</option>
                    <option value="scheduled" {% if project.status=='scheduled' %}selected{% endif %}>جدولة النشر
                        المستقبلي</option>
                </select>

                <input type="datetime-local" name="publish_at" class="datetime-input"
                    value="{{ project.publish_at.strftime('%Y-%m-%dT%H:%M') if project.publish_at else '' }}" {% if
                    project.status=='scheduled' %}style="display: block;" {% else %}style="display: none;" {% endif %}>

                <button type="submit" class="cta-button" style="margin-top: 15px;">حفظ التعديلات النهائية</button>
                <a href="{{ url_for('admin') }}" class="back-btn"
                    style="display: block; text-align: center; margin-top: 10px;">إلغاء والعودة</a>
            </form>
        </div>

        <div class="admin-card editor-box">
            <h2>المعاينة اللحظية (Live Preview)</h2>
            <div class="preview-wrapper">
                <img id="preview-image" src="" alt="Preview" class="preview-img" style="display: none;"
                    onerror="this.style.display='none'">
                <i id="preview-icon" class="card-icon"
                    style="font-size: 4rem; color: var(--primary-gold); display: none;"></i>
                <h3 id="preview-title" style="color: var(--primary-gold); margin: 15px 0;"></h3>
                <p id="preview-desc" style="color: #ccc; line-height: 1.6;"></p>
            </div>
        </div>
    </div>

    <script>
        const tInput = document.getElementById('title');
        const dInput = document.getElementById('description');
        const iInput = document.getElementById('icon');

        const pTitle = document.getElementById('preview-title');
        const pDesc = document.getElementById('preview-desc');
        const pImg = document.getElementById('preview-image');
        const pIcon = document.getElementById('preview-icon');

        function updateLivePreview() {
            pTitle.textContent = tInput.value;
            pDesc.textContent = dInput.value;
            const iconVal = iInput.value.trim();

            if (iconVal.startsWith('http')) {
                pImg.src = iconVal;
                pImg.style.display = 'block';
                pIcon.style.display = 'none';
            } else {
                pImg.style.display = 'none';
                pIcon.className = iconVal;
                pIcon.style.display = 'inline-block';
            }
        }
        tInput.addEventListener('input', updateLivePreview);
        dInput.addEventListener('input', updateLivePreview);
        iInput.addEventListener('input', updateLivePreview);

        updateLivePreview(); // تشغيل عند فتح الصفحة

        function toggleDate(selectElement) {
            let dateInput = selectElement.nextElementSibling;
            if (selectElement.value === 'scheduled') {
                dateInput.style.display = 'block';
                dateInput.required = true;
            } else {
                dateInput.style.display = 'none';
                dateInput.required = false;
            }
        }
    </script>
</body>

</html>
