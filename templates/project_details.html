<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>{{ project.title }} | التفاصيل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="details-page">

    <div class="details-container">
        <a href="{{ url_for('home') }}" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>

        <div class="details-header">
            <i class="{{ project.icon }} details-icon"></i>
            <h1>{{ project.title }}</h1>
        </div>

        <div class="details-content">
            <h3>نبذة عن المشروع</h3>
            <p>{{ project.full_details }}</p>

            <h3 class="tech-title">التقنيات المستخدمة</h3>
            <p class="tech-tags">{{ project.technologies }}</p>
        </div>
    </div>

</body>

</html>
